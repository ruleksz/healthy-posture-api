version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: healthy-posture-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 3221
      POSTGRES_DB: healthy_posture_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
